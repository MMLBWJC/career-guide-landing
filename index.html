<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生涯问向</title>
    <link rel="stylesheet" href="./style.css?v=f1d0c06" />
  </head>
  <body>
    <main class="viewport" aria-label="生涯问向引导页">
      <section class="stage" id="stage">
        <img class="ambient ambient-top" src="./img/glow-top.svg" alt="" />
        <img class="ambient ambient-bottom" src="./img/glow-bottom.svg" alt="" />
        <img class="grid-bg" src="./img/网格.svg" alt="" />
        <div class="title-glow" aria-hidden="true"></div>

        <header class="topbar">
          <a class="brand" href="#" aria-label="生涯问向首页">
            <img class="brand-mark" src="./img/logo-mark.svg" alt="" />
            <img class="brand-text" src="./img/logo-text.svg" alt="生涯问向" />
          </a>

          <div class="user-area">
            <button class="profile-button" type="button" aria-expanded="false" aria-controls="profile-panel">
              <span>Say My Name</span>
              <span class="divider" aria-hidden="true"></span>
              <span class="avatar-mask">
                <img src="./img/avatar.png" alt="" />
              </span>
            </button>
            <button class="menu-button" type="button" aria-expanded="false" aria-controls="menu-panel" aria-label="打开菜单">
              <img src="./img/menu.svg" alt="" />
            </button>
          </div>
        </header>

        <div class="profile-panel" id="profile-panel" hidden>
          <strong>Say My Name</strong>
          <span>当前旅程：了解自己</span>
        </div>

        <nav class="menu-panel" id="menu-panel" hidden aria-label="菜单">
          <a href="#steps">旅程步骤</a>
          <a href="#steps">职业路径</a>
          <a href="#steps">岗位推荐</a>
        </nav>

        <section class="hero">
          <p class="eyebrow">你的旅程，从这里开始</p>
          <h1>
            从<span class="accent">认识自己</span>，到明确目标<br />
            最后找到真正适合你的机会
          </h1>
        </section>

        <section class="steps" id="steps" aria-label="旅程步骤">
          <article class="card card-active" data-step="1">
            <div class="card-top">
              <img class="step-icon" src="./img/icon-step1.svg" alt="" />
              <span class="badge badge-active">当前步骤</span>
            </div>
            <div class="card-copy">
              <p class="step-label">第一步</p>
              <h2>了解自己</h2>
              <p>完成评估，探索你的工作风格、核心动力、天然优势与潜在盲区。</p>
            </div>
            <button class="primary-action" type="button">
              开始评估
              <svg viewBox="0 0 20 20" aria-hidden="true">
                <path d="M4.4 10h10.1M10.4 5.8 14.6 10l-4.2 4.2" />
              </svg>
            </button>
            <p class="card-note">约<span>30分钟</span>完成</p>
          </article>

          <article class="card is-locked" data-step="2" tabindex="0">
            <div class="card-top">
              <img class="step-icon" src="./img/icon-step2.svg" alt="" />
              <span class="badge">完成评估后解锁</span>
            </div>
            <div class="card-copy muted">
              <p class="step-label">第二步</p>
              <h2>规划职业路径</h2>
              <p>根据你的画像，系统呈现多个职业方向，帮助<br />你缩小范围，找到更适合的路。</p>
            </div>
            <p class="card-note strong"><span>完成即看</span> 评估结果</p>
          </article>

          <article class="card is-locked" data-step="3" tabindex="0">
            <div class="card-top">
              <img class="step-icon" src="./img/icon-step3.svg" alt="" />
              <span class="badge">路径确认后解锁</span>
            </div>
            <div class="card-copy muted">
              <p class="step-label">第三步</p>
              <h2>直通优势岗位</h2>
              <p>方向逐渐清晰后，系统持续推荐更匹配的实习<br />与职场机会。</p>
            </div>
            <p class="card-note strong"><span>持续推送</span> 匹配岗位</p>
          </article>
        </section>

        <div class="toast" role="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="./script.js?v=f1d0c06"></script>
  </body>
</html>
