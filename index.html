<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生涯问向</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="生涯问向引导页">
      <div class="grain"></div>
      <div class="shell">
        <header class="topbar">
          <a class="brand" href="#" aria-label="生涯问向首页">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>生涯问向</span>
          </a>
          <div class="profile">
            <span>Percy</span>
            <span class="divider"></span>
            <span class="avatar" aria-hidden="true"></span>
          </div>
        </header>

        <section class="hero" aria-labelledby="hero-title">
          <p class="eyebrow">你的旅程，从这里开始</p>
          <h1 id="hero-title">
            <span>从认识自己，到明确目标</span>
            <span>最后找到真正适合你的机会</span>
          </h1>
          <div class="unlock">
            <span>完成评估后，你将解锁：</span>
            <strong>职业画像</strong>
            <i></i>
            <strong>职业路径</strong>
            <i></i>
            <strong>岗位推荐</strong>
          </div>
          <span class="tiny-rule" aria-hidden="true"></span>
        </section>

        <section class="cards" aria-label="评估流程">
          <article class="step-card active">
            <div class="step-number">1</div>
            <p class="step-label">第一步</p>
            <h2>了解自己</h2>
            <p class="step-copy">完成评估，探索你的工作风格、核心动力、天然优势与潜在盲区。</p>
            <a class="cta" href="#">
              <span>开始评估</span>
              <span aria-hidden="true">→</span>
            </a>
            <span class="card-icon person" aria-hidden="true"></span>
          </article>

          <span class="flow-arrow" aria-hidden="true">→</span>

          <article class="step-card">
            <div class="step-number">2</div>
            <p class="step-label">第二步</p>
            <h2>规划职业路径</h2>
            <p class="step-copy">根据你的画像，系统将呈现多个职业方向，帮助你缩小范围，找到真正适合你的路。</p>
            <span class="card-icon route" aria-hidden="true"></span>
          </article>

          <span class="flow-arrow" aria-hidden="true">→</span>

          <article class="step-card">
            <div class="step-number">3</div>
            <p class="step-label">第三步</p>
            <h2>直通优势岗位</h2>
            <p class="step-copy">方向逐渐清晰后，系统将推荐更匹配的实习与职场机会，并持续为你实时推送。</p>
            <span class="card-icon job" aria-hidden="true"></span>
          </article>
        </section>

        <footer class="info-strip" aria-label="评估说明">
          <div class="info-item">
            <span class="info-icon clock" aria-hidden="true"></span>
            <span>约 <strong>30 分钟</strong> 完成</span>
          </div>
          <span class="strip-divider"></span>
          <div class="info-item">
            <span class="info-icon flash" aria-hidden="true"></span>
            <span><strong>即时查看</strong> — 评估完成后立即获得结果</span>
          </div>
          <span class="strip-divider"></span>
          <div class="info-item">
            <span class="info-icon refresh" aria-hidden="true"></span>
            <span><strong>持续推送</strong> — 推荐岗位自动更新</span>
          </div>
        </footer>
      </div>
    </main>

    <script src="./gsap.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
